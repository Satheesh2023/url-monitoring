apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-monitor-weekly-report
  namespace: health-monitor
spec:
  schedule: "0 9 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: wait-for-mysql
              image: busybox:1.36
              command:
                - sh
                - -c
                - until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done
          containers:
            - name: report
              image: YOUR_DOCKERHUB_USER/health-monitor:latest
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - node dist/scripts/weekly-report.js
              workingDir: /app/server
              env:
                - name: NODE_ENV
                  value: production
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: DATABASE_URL
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: SLACK_WEBHOOK_URL
          backoffLimit: 2
