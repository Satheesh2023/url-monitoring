apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: health-monitor
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "change-me-root"
  MYSQL_PASSWORD: "change-me-app"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: health-monitor
type: Opaque
stringData:
  DATABASE_URL: "mysql://healthmon:change-me-app@mysql:3306/healthmonitor"
  SLACK_WEBHOOK_URL: ""
  SLACK_CHANNEL: ""
