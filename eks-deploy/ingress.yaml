# AWS Load Balancer Controller v2 — adjust annotations for your account.
# Replace ACM certificate ARN and hostname; set group.name if you share one ALB across Ingresses.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: url-monitoring
  labels:
    app: url-monitoring
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    # HTTPS + redirect (requires ACM cert in this region)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-southeast-1:194428989522:certificate/21c1da74-ed6f-42ad-9fb0-fd73ac26f58e
    # Optional: reuse one ALB for multiple Ingresses
    # alb.ingress.kubernetes.io/group.name: shared-public
spec:
  ingressClassName: alb
  rules:
    - host: monitor-url.tricogdev.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: url-monitoring
                port:
                  number: 3000
