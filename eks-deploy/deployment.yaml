apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-monitoring
  labels:
    app: url-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: url-monitoring
  template:
    metadata:
      labels:
        app: url-monitoring
    spec:
      containers:
        - name: app
          image: satheesh2023/url-monitoring:e6cf1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SLACK_WEBHOOK_URL
            - name: SLACK_CHANNEL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SLACK_CHANNEL
                  optional: true
            - name: POLL_CONCURRENCY
              value: "10"
            - name: FLAP_FAILURES_BEFORE_DOWN
              value: "3"
            - name: FLAP_SUCCESSES_BEFORE_UP
              value: "2"
          # migrate deploy runs before Node listens — without this, liveness hits
          # connection refused and kubelet restarts the pod (503 from ALB).
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
