apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-monitoring
  labels:
    app: url-monitoring
spec:
  # Spread load; rolling update keeps at least desired count ready (maxUnavailable: 0).
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  minReadySeconds: 20
  selector:
    matchLabels:
      app: url-monitoring
  template:
    metadata:
      labels:
        app: url-monitoring
    spec:
      terminationGracePeriodSeconds: 45
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: url-monitoring
                topologyKey: kubernetes.io/hostname
      containers:
        - name: app
          image: satheesh2023/url-monitoring:25451
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SLACK_WEBHOOK_URL
            - name: SLACK_CHANNEL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SLACK_CHANNEL
                  optional: true
            # Lower if many targets to reduce event-loop pressure (helps /api/health latency).
            - name: POLL_CONCURRENCY
              value: "5"
            - name: FLAP_FAILURES_BEFORE_DOWN
              value: "3"
            - name: FLAP_SUCCESSES_BEFORE_UP
              value: "2"
          lifecycle:
            preStop:
              exec:
                # Let ALB deregister this pod before SIGTERM (target group deregistration delay).
                command: ["/bin/sh", "-c", "sleep 20"]
          # migrate deploy runs before Node listens — without this, liveness hits
          # connection refused and kubelet restarts the pod (503 from ALB).
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
