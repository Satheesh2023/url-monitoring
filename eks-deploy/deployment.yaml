# 2 pods — container runs `node dist/index.js` only (see command:). Run job-db-migrate.yaml for schema.
# Dockerfile CMD still includes migrate for local docker; EKS overrides command here. Secret app-secret required.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-monitoring
  labels:
    app: url-monitoring
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  minReadySeconds: 15
  selector:
    matchLabels:
      app: url-monitoring
  template:
    metadata:
      labels:
        app: url-monitoring
    spec:
      terminationGracePeriodSeconds: 45
      # Prefer different nodes so two replicas don’t fight one node’s RAM.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["url-monitoring"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: app
          image: satheesh2023/url-monitoring:a90b7
          imagePullPolicy: IfNotPresent
          # Do not run prisma migrate here: 2 replicas would race and one pod can exit 1 → CrashLoop.
          # Apply eks-deploy/job-db-migrate.yaml once per release (or after schema changes) before rollout.
          workingDir: /app/server
          command: ["node", "dist/index.js"]
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            # Heap below 3Gi limit — leave headroom for native (Prisma, TLS, buffers).
            - name: NODE_OPTIONS
              value: "--max-old-space-size=2560"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SLACK_WEBHOOK_URL
            - name: SLACK_CHANNEL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SLACK_CHANNEL
                  optional: true
            - name: POLL_CONCURRENCY
              value: "2"
            - name: FLAP_FAILURES_BEFORE_DOWN
              value: "3"
            - name: FLAP_SUCCESSES_BEFORE_UP
              value: "2"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            # Give Node + first Prisma tick time on small CPU; refused = process not listening yet or exited
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 3Gi
