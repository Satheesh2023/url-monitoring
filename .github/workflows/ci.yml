# npm build on ubuntu (same as Dockerfile’s install/build path), then Docker.
# PR: Docker build only (no push). Push to main/master: push to Docker Hub.
#
# Secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_TOKEN — https://hub.docker.com/settings/security
#   DOCKERHUB_USERNAME or DOCKER_USERNAME
#
# Image tag: first 5 hex chars of the commit SHA (no :latest).
# Set the same image tag in eks-deploy/ (kustomization.yaml / deployment.yaml / cronjob / migrate job).

name: CI — npm build and Docker

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: url-monitoring
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Install Linux native optional deps
        run: |
          npm install --no-save \
            @rollup/rollup-linux-x64-gnu \
            lightningcss-linux-x64-gnu \
            @tailwindcss/oxide-linux-x64-gnu

      - name: Build web
        run: npm run build -w web
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build server
        run: npm run build -w server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker tag (first 5 of commit SHA)
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FULL="${{ github.event.pull_request.head.sha }}"
          else
            FULL="${{ github.sha }}"
          fi
          echo "short=${FULL:0:5}" >> "$GITHUB_OUTPUT"

      - name: Build only (pull request)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:pr-${{ steps.tag.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
