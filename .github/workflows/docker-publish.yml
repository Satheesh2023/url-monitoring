# Build on pull requests (no push). Build and push to Docker Hub on main/master.
#
# Secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_TOKEN — Access token from https://hub.docker.com/settings/security
#   Username — use either DOCKERHUB_USERNAME or DOCKER_USERNAME (same value)
#
# Pushed image:
#   docker.io/<DOCKERHUB_USERNAME>/url-monitoring:latest
#   docker.io/<DOCKERHUB_USERNAME>/url-monitoring:<short-sha>
#
# Set the same image in k8s/03-app.yaml and k8s/04-cronjob-weekly.yaml.

name: Docker build and push

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: url-monitoring

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      # Supports DOCKER_USERNAME (your current name) or DOCKERHUB_USERNAME
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build only (pull request)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.head.sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
